<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 Months With You </title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;
  color: white;
}

/* container */
.container {
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 420px;
  transition: 0.6s;
}

.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translate(-50%, -40%) scale(0.9);
}

img {
  width: 100%;
  border-radius: 15px;
  margin-top: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* gallery */
.gallery {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.gallery img {
  height: 120px;
  object-fit: cover;
}

/* buttons */
button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4f91;
  color: white;
  cursor: pointer;
}

/* FINAL HEART BURST */
.heartBurst span {
  position: absolute;
  color: #ff4f91;
  animation: burst 1.5s ease-out forwards;
}

@keyframes burst {
  0% { transform: scale(0); opacity: 1; }
  100% { transform: translate(var(--x), var(--y)) scale(1.5); opacity: 0; }
}

/* glow effect */
.glow {
  animation: glowAnim 2s infinite alternate;
}
@keyframes glowAnim {
  from { box-shadow: 0 0 10px #fff; }
  to { box-shadow: 0 0 25px #ff4f91; }
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->
<div class="container" id="p1">
  <h1>Hey </h1>
  <p>10 monthsů and still feels like magic.</p>
  <img src="img1.jpg">
  <button onclick="start()">Start </button>
</div>

<!-- PAGE 2 -->
<div class="container hidden" id="p2">
  <p>Our fun side </p>
  <img src="img2.jpg">
  <button onclick="next('p2','p3')">Next </button>
</div>

<!-- PAGE 3 -->
<div class="container hidden" id="p3">
  <p>Little moments matter </p>
  <img src="img3.jpg">
  <button onclick="next('p3','p4')">Next </button>
</div>

<!-- PAGE 4 -->
<div class="container hidden" id="p4">
  <p>Special memories </p>
  <img src="img4.jpg">
  <button onclick="next('p4','p5')">Next </button>
</div>

<!-- PAGE 5 -->
<div class="container hidden" id="p5">
  <p>And then thereĺs YOU </p>
  <img src="img5.jpg">
  <button onclick="next('p5','p6')">Next </button>
</div>

<!-- GALLERY -->
<div class="container hidden" id="p6">
  <h2>Our Memories </h2>
  <div class="gallery">
    <img src="img6.jpg">
    <img src="img7.jpg">
    <img src="img8.jpg">
    <img src="img9.jpg">
  </div>
  <button onclick="next('p6','p7')">Final </button>
</div>

<!-- FINAL PAGE -->
<div class="container hidden glow" id="p7">
  <h1>Happy 10 Months </h1>
  <img src="img10.jpg">
  <p>Iĺm really lucky to have you.</p>
</div>

<script>
function start(){
  document.getElementById("music").play(); // start music
  next('p1','p2');
}

function next(c,n){
  document.getElementById(c).classList.add("hidden");
  document.getElementById(n).classList.remove("hidden");

  // trigger heart burst on final page
  if(n === 'p7') heartBurst();
}

/* HEART BURST */
function heartBurst(){
  for(let i=0;i<20;i++){
    let h = document.createElement("span");
    h.innerHTML = "";
    h.style.left = "50%";
    h.style.top = "50%";
    h.style.setProperty('--x', (Math.random()*400-200)+'px');
    h.style.setProperty('--y', (Math.random()*400-200)+'px');
    h.classList.add("heartBurst");
    document.body.appendChild(h);

    setTimeout(()=>h.remove(),1500);
  }
}
</script>

</body>
</html>
